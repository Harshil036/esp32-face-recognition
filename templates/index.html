<!DOCTYPE html>
<html>
<head>
    <title>Face Recognition System</title>

    <style>
        body{
            text-align:center;
            font-family:Arial;
            background:#f5f5f5;
        }

        img{
            border:3px solid #444;
            border-radius:10px;
        }

        button{
            padding:10px 18px;
            margin:8px;
            font-size:16px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<h2>🎥 Live Camera</h2>

<img id="camera" src="/video_feed" width="900">

<br><br>

<button onclick="createNewEvent()">Create Event</button>
<button onclick="startRecognition()">Start Recognition</button>
<button onclick="stopRecognition()">End Recognition</button>
<button onclick="downloadAttendance()">Download Attendance</button>

<script>

async function createNewEvent() {

    const name = prompt("Enter Event Name:");
    if (!name) return;

    const res = await fetch("/create_event", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({event_name: name})
    });

    const data = await res.json();
    alert(data.message || data.error);
}


async function startRecognition() {

    const res = await fetch("/start_recognition", {
        method:"POST"
    });

    const data = await res.json();

    if(data.error){
        alert("⚠️ " + data.error);
        return;
    }

    alert("Recognition Started ✅");
}


async function stopRecognition() {

    const res = await fetch("/stop_recognition", {
        method:"POST"
    });

    const data = await res.json();

    alert("Recognition Stopped ⛔");
}

    function downloadAttendance(){
    window.location.href = "/download_attendance";
}

</script>

</body>
</html>
